version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
      time: '05:00'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 20
    labels:
      - 'dependencies'
      - 'security'
    commit-message:
      prefix: 'chore(deps)'
    versioning-strategy: 'increase'

  - package-ecosystem: 'npm'
    directory: '/packages/cli'
    schedule:
      interval: 'daily'
      time: '05:10'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 20
    labels:
      - 'dependencies'
      - 'security'
    commit-message:
      prefix: 'chore(deps)'
    versioning-strategy: 'increase'

  - package-ecosystem: 'npm'
    directory: '/packages/core'
    schedule:
      interval: 'daily'
      time: '05:20'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 20
    labels:
      - 'dependencies'
      - 'security'
    commit-message:
      prefix: 'chore(deps)'
    versioning-strategy: 'increase'

  - package-ecosystem: 'npm'
    directory: '/packages/dev-server'
    schedule:
      interval: 'daily'
      time: '05:30'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 20
    labels:
      - 'dependencies'
      - 'security'
    commit-message:
      prefix: 'chore(deps)'
    versioning-strategy: 'increase'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
      time: '05:40'
      timezone: 'Etc/UTC'
    labels:
      - 'dependencies'
      - 'ci'
