name: CI

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Validate (lint, typecheck, test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Version sync policy
        run: npm run version:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Performance budget gate (@nextify/build)
        run: npm --workspace @nextify/build run build

      - name: Synthetic benchmark gate (p50/p95 por cenário)
        run: npm run benchmark:synthetic

      - name: Performance regression gate (baseline)
        run: npm run benchmark:regression

      - name: Production reliability feedback loop (real traffic gate)
        run: npm run reliability:production-gate

      - name: DORA metrics gate
        run: npm run metrics:dora

      - name: Generate internal audit report
        run: npm run audit:internal

      - name: Generate engineering health panel
        run: npm run engineering-health:panel

      - name: Generate AI quality narrative metrics
        run: npm run metrics:ai-quality

      - name: Upload engineering health artifacts
        uses: actions/upload-artifact@v4
        with:
          name: engineering-health-panel
          path: |
            artifacts/health/engineering-health-panel.json
            artifacts/health/engineering-health-panel.md
            artifacts/health/ai-quality-metrics.json
            artifacts/health/ai-quality-metrics.md
            artifacts/observability/production-feedback-report.latest.json
            artifacts/dora/metrics.latest.json
            artifacts/dora/metrics.latest.md

  e2e-smoke:
    name: E2E Smoke (reference app)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run smoke E2E
        run: npm run test:e2e

  dependency-audit:
    name: Dependency Audit (release gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run npm audit (fail on high/critical in production deps)
        run: npm audit --omit=dev --audit-level=high

  provenance-gate:
    name: Provenance Gate (SBOM + attestation)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Generate SBOM
        run: npm run sbom:generate

      - name: Enforce provenance policy (reject invalid artifact)
        env:
          COSIGN_CERT_IDENTITY_REGEXP: "^https://github\\.com/${{ github.repository }}/\\.github/workflows/ci\\.yml@.*$"
          COSIGN_CERT_ISSUER: 'https://token.actions.githubusercontent.com'
        run: npm run provenance:verify
